<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G4F - Community</title>
    <link rel="icon" href="dist/img/g4f.svg" type="image/svg+xml">
    <style>
        :root {
            --primary: #6e48aa;
            --dark: #1a1a2e;
            --light: #f8f9fa;
            --discord: #5865F2;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--dark), #16213e);
            color: var(--light);
            margin: 0;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .post-form {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        textarea {
            width: 100%;
            height: 100px;
            background: rgba(0, 0, 0, 0.2);
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
        .post {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--discord);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Community Forum</h1>
        <div id="loginStatus"></div>
        <div class="post-form" id="postForm" style="display: none;">
            <textarea id="postContent" placeholder="Ask a question or post to the Community..."></textarea>
            <button onclick="addPost()">Post</button>
        </div>
        <div id="posts"></div>
    </div>

    <script>
        // Check login status (assuming a simple check for now)
        const user = localStorage.getItem('g4f_user');
        let userData = null;
        try {
            userData = user ? JSON.parse(user) : null;
        } catch (e) {
            console.error("Failed to parse user data", e);
        }

        if (userData && userData.username) {
            document.getElementById('loginStatus').innerHTML = `<p>Logged in as ${userData.username}</p>`;
            document.getElementById('postForm').style.display = 'block';
        } else {
            document.getElementById('loginStatus').innerHTML = `<p><a href="members.html?redirect=community.html">Login to post</a></p>`;
        }

        async function fetchPosts() {
            const response = await fetch('https://discord.g4f.space/');
            const messages = await response.json();
            const posts = document.getElementById('posts');
            posts.innerHTML = '';
            messages.forEach(m => {
                const post = document.createElement('div');
                post.className = 'post';
                post.innerHTML = `
                    <strong>${m.author}</strong>
                    <p>${m.content}</p>
                    <button class="copy-btn" onclick="copyToDiscord(this)">Copy</button>
                `;
                posts.appendChild(post);
            });
        }
        fetchPosts();

        async function addPost() {
            const content = document.getElementById('postContent').value;
            if (!content || !userData) return;
            
            try {
                // Fetch JWT token for authentication
                const jwtResponse = await fetch('https://auth.g4f.space/members/api/jwt', { headers: { 'Authorization': `Bearer ${localStorage.getItem('g4f_session'}`}});
                if (!jwtResponse.ok) throw new Error('Failed to fetch authentication token: ' + (await jwtResponse.text()));
                const { token } = await jwtResponse.json();

                const response = await fetch('https://discord.g4f.space/', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        author: userData.username,
                        content: content
                    })
                });

                if (response.ok) {
                    fetchPosts();
                    document.getElementById('postContent').value = '';
                } else {
                    const err = await response.text();
                    alert('Error posting: ' + err);
                }
            } catch (e) {
                console.error(e);
                alert('Authentication error: ' + e.message);
            }
        }

        function copyToDiscord(btn) {
            const text = btn.parentElement.querySelector('p').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard! You can now paste it into Discord.');
            });
        }
    </script>
</body>
</html>
